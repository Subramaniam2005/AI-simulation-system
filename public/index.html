<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>AI Multi-Agent Conversation</title>

  <link rel="stylesheet" href="styles.css" />
</head>

<body>

  <div class="app">

    <!-- Header -->
    <header class="header">

      <div>
        <h1>Multi-Agent Conversation</h1>
        <p>AI personalities discussing weekend plans</p>
      </div>

      <button id="generateBtn" onclick="startSimulation()">
        Generate Conversation
      </button>

    </header>

    <!-- Chat Container -->
    <main class="chat-container" id="output">

      <div class="empty-state">
        Click "Generate Conversation" to start the AI simulation.
      </div>

    </main>

  </div>

  <script src="script.js"></script>

</body>

</html>
